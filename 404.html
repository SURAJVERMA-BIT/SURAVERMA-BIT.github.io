<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="shortcut icon" href="/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-title" content="XiteAI" />
  <link rel="manifest" href="/site.webmanifest" />
  <title>404 - Page Not Found | XiteAI</title>
  <meta name="description" content="The page you're looking for doesn't exist. Return to XiteAI homepage.">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@400;500;600;700&display=swap">
  <style>
    :root {
      --bg-color: #121212;
      --text-color: #a3a3a3;
      --heading-color: #f5f5f5;
      --border-color: #2a2a2a;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100vw;
      height: 100vh;
      overflow-x: hidden;
      background-color: var(--bg-color);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: var(--text-color);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      text-align: center;
      padding: 40px;
      max-width: 600px;
    }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 120px;
      font-weight: 600;
      color: var(--heading-color);
      margin-bottom: 20px;
      line-height: 1;
    }
    h2 {
      font-family: 'Playfair Display', serif;
      font-size: 32px;
      font-weight: 600;
      color: var(--heading-color);
      margin-bottom: 16px;
    }
    p {
      font-size: 16px;
      margin-bottom: 32px;
      line-height: 1.8;
    }
    .home-button {
      display: inline-block;
      padding: 12px 32px;
      background: var(--heading-color);
      color: var(--bg-color);
      text-decoration: none;
      border-radius: 6px;
      font-weight: 500;
      transition: all 0.2s ease;
    }
    .home-button:hover {
      opacity: 0.9;
      transform: translateY(-2px);
    }
  </style>

<style id="xai-protect">
img { -webkit-user-drag: none; user-drag: none; -webkit-user-select: none; user-select: none; }
</style>

</head>
<body>
  <div class="container">
    <h1>404</h1>
    <h2>Page Not Found</h2>
    <p>The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
    <a href="/" class="home-button">Return Home</a>
  </div>

<script id="xai-protect-js">
(function(){
  // Block right-click on images
  document.addEventListener("contextmenu", function(e) {
    if (e.target.tagName === "IMG") { e.preventDefault(); return false; }
  });
  // Block drag on images
  document.addEventListener("dragstart", function(e) {
    if (e.target.tagName === "IMG") { e.preventDefault(); return false; }
  });
  // Console warning
  var s = [
    "%c  XiteAI Technologies  ",
    "background:#080808;color:#f0f0f0;font-size:14px;font-weight:600;padding:6px 12px;border-radius:4px;"
  ];
  console.log.apply(console, s);
  console.log("%cThis site and its contents are protected by copyright.\nUnauthorized use of source code, assets, or design is prohibited.", "color:#666;font-size:12px;");
})();
</script>
</body>
</html>
