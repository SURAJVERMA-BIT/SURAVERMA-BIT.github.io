  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      width: 100%;
      background: #080808;
      color: #fff;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Shell: 3-row grid fills the screen ── */
    .shell {
      height: 100vh;
      min-height: 560px;
      display: grid;
      grid-template-rows: 64px 1fr 56px;
      padding: 0 32px;
    }

    /* ── Top row: logo left ── */
    .top {
      display: flex;
      align-items: center;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 9px;
      text-decoration: none;
    }
    .logo img {
      width: 18px;
      height: 18px;
      object-fit: contain;
      opacity: 0.9;
    }
    .logo-word {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #f0f0f0;
    }

    /* ── Middle row: the moment ── */
    .middle {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 0;
    }

    h1 {
      font-size: clamp(72px, 12vw, 160px);
      font-weight: 900;
      line-height: 0.95;
      letter-spacing: -0.04em;
      color: #fff;
      text-shadow:
        3px 3px 0 rgba(255,255,255,0.04),
        0 0 80px rgba(255,255,255,0.06);
      margin-bottom: clamp(20px, 3vw, 36px);
      opacity: 0;
      animation: up 0.7s cubic-bezier(0.16,1,0.3,1) 0.15s forwards;
    }

    .line1 {
      display: block;
      font-size: clamp(18px, 2.4vw, 28px);
      font-weight: 400;
      color: #f0f0f0;
      letter-spacing: -0.01em;
      line-height: 1.5;
      margin-bottom: 10px;
      opacity: 0;
      animation: up 0.6s cubic-bezier(0.16,1,0.3,1) 0.4s forwards;
    }
    .line2 {
      display: block;
      font-size: clamp(13px, 1.5vw, 16px);
      font-weight: 400;
      color: #444;
      letter-spacing: 0.01em;
      opacity: 0;
      animation: up 0.6s cubic-bezier(0.16,1,0.3,1) 0.55s forwards;
    }

    /* ── Social icons ── */
    .socials {
      display: flex;
      align-items: center;
      gap: 18px;
      margin-top: clamp(36px, 5vw, 56px);
      opacity: 0;
      animation: up 0.6s cubic-bezier(0.16,1,0.3,1) 0.7s forwards;
    }
    .s {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 1px solid #1e1e1e;
      color: #444;
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      transition: color 0.15s, border-color 0.15s;
    }
    .s:hover { color: #fff; border-color: #444; }
    /* SVG icons inside */
    .s svg { width: 16px; height: 16px; fill: currentColor; }

    /* ── Bottom row: copyright ── */
    .bottom {
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      animation: fadeIn 0.5s ease 1s forwards;
    }
    .bottom p {
      font-size: 11px;
      color: #222;
      letter-spacing: 0.04em;
    }

    @keyframes up {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn { to { opacity: 1; } }

    @media (max-width: 480px) {
      .shell { padding: 0 20px; grid-template-rows: 56px 1fr 48px; }
    }
  </style>

<style id="xai-protect">
